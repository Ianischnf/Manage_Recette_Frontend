<div class="register_page_layout">
    <div class="container_register">
        <div class="title">
            <h1>Inscription</h1>
        </div>
        <app-input-component
            type="text"
            input="input"
            placeholder="Nom"
        ></app-input-component>

        <app-input-component
            type="text"
            input="input"
            placeholder="Prénom"
        ></app-input-component>

        <app-input-component
            type="email"
            input="input"
            placeholder="Adresse email"
        ></app-input-component>

        <app-input-component
            type="password"
            input="input"
            placeholder="Mot de passe"
        ></app-input-component>

        <app-button
            type="button"
            label="Créer mon compte"
            variant="btn_register"
        ></app-button>
    </div>
