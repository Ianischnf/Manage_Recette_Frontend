<div class="login_page_layout">
    <div class="container_login">
        <div class="title">
            <h1>Connexion</h1>
        </div>
        <form [formGroup]="LoginForm" (ngSubmit)="onLogin()">

            <app-input-component
                type="email"
                input="input"
                placeholder = "Adresse email"
                formControlName = "email"
            ></app-input-component>

            <app-input-component
                type="password"
                input="input"
                placeholder = "Mot de passe"
                
                formControlName = "password"
            ></app-input-component>

            <app-button
                label="Se connecter" 
                type="submit" 
                variant="btn_login"
            ></app-button>

            <app-button
                label="Créér un compte" 
                type="button" 
                variant="btn_register"
                link="/register"
            ></app-button>

            <a href="#">Mot de passe oublié ?</a>
        </form>
    </div>
</div>
