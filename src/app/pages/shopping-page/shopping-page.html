<div class="layout_shopping_page">
    <app-navbar-component></app-navbar-component>
    <div class="container_shopping_page">

            <div class="container_create_ingredient_left">

                <app-button type="submit" label="Ajouter"></app-button>
            </div>
            <div class="container_create_ingredient_right">

                    <mat-list role="list">

                        <mat-list-item role="listitem">Item 2</mat-list-item>
                        <mat-list-item role="listitem">Item 3</mat-list-item>
                    </mat-list>

                </div>
            </div>

    </div>
</div>
