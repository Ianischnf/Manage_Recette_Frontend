<div class="layout_shopping_page">
    <app-navbar-component></app-navbar-component>
    <div class="container_shopping_page">
        <div class="container_create_ingredient">
            <div class="title">
                <h1>Ajouter un ingrédient</h1>
            </div>
            <form class="container_create_ingredient_left" [formGroup]="IngredientForm" (ngSubmit)="onCreateIngredient()">
                <div class="form_left">
                    <app-input-component type="text" placeholder="Ajouter un produit..." formControlName="Name" ></app-input-component>
                </div>
                <div class="form_right">
                    <app-button type="submit" label="Ajouter" class="btn_ajout_ingredient"></app-button>
                </div>
            </form>
            <div class="container_create_ingredient_right">
                <div class="container_list_ingredients">
                    <mat-list role="list">
                        @for (ingredient of Ingredients; track $index) {
                            <mat-list-item role="listitem">{{ ingredient.Name }}</mat-list-item>
                           
                        }
                    </mat-list>
                </div>
            </div>
        </div>
    </div>
</div>
